apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: globalsend-site
  namespace: argocd
spec: 
  project: default
  source:
    repoURL: 'https://github.com/tecknosap/globalsend-k8s-azure'
    targetRevision: main
    path: helm/globalsend-site
    helm:
      valueFiles:
        - values.yaml
  destination:
    server: 'https://kubernetes.default.svc'
    namespace: default
  syncPolicy:
    automated:
      prune: true
      selfHeal: true