name: Terraform Deploy
######
on:
  push:
    branches: 
      - main
      - staging
      - dev
  workflow_dispatch: 

permissions:
  id-token: write
  contents: read

jobs:
  terraform-deploy:
    name: Terraform Deploy
    runs-on: ubuntu-latest
    environment: ${{ github.ref_name == 'main' && 'prod' || github.ref_name == 'staging' && 'staging' || 'dev' }}

    steps:
      - name: Checkout code
        uses: actions/checkout@v3

      - name: Debug Environment
        run: echo "Deploying to ${{ github.job }} in ${{ github.environment }} environment"

      # Azure login for dev using OIDC
      - name: Login to Azure (OIDC for dev)
        if: github.ref_name == 'dev'
        uses: azure/login@v1.6.1
        with:
          client-id: ${{ secrets.DEV_AZURE_CLIENT_ID }}
          tenant-id: ${{ secrets.DEV_AZURE_TENANT_ID }}
          subscription-id: ${{ secrets.DEV_AZURE_SUBSCRIPTION_ID }}

      - name: Export ARM_* env vars (dev)
        if: github.ref_name == 'dev'
        run: |
          echo "ARM_CLIENT_ID=${{ secrets.DEV_AZURE_CLIENT_ID }}" >> $GITHUB_ENV
          echo "ARM_TENANT_ID=${{ secrets.DEV_AZURE_TENANT_ID }}" >> $GITHUB_ENV
          echo "ARM_SUBSCRIPTION_ID=${{ secrets.DEV_AZURE_SUBSCRIPTION_ID }}" >> $GITHUB_ENV

      # Azure login for staging using SP credentials
      - name: Login to Azure (SP for staging)
        if: github.ref_name == 'staging'
        uses: azure/login@v1.6.1
        with:
          client-id: ${{ secrets.STAGING_AZURE_CLIENT_ID }}
          tenant-id: ${{ secrets.STAGING_AZURE_TENANT_ID }}
          subscription-id: ${{ secrets.STAGING_AZURE_SUBSCRIPTION_ID }}

      - name: Export ARM_* env vars (staging)
        if: github.ref_name == 'staging'
        run: |
          echo "ARM_CLIENT_ID=${{ secrets.STAGING_AZURE_CLIENT_ID }}" >> $GITHUB_ENV
          echo "ARM_TENANT_ID=${{ secrets.STAGING_AZURE_TENANT_ID }}" >> $GITHUB_ENV
          echo "ARM_SUBSCRIPTION_ID=${{ secrets.STAGING_AZURE_SUBSCRIPTION_ID }}" >> $GITHUB_ENV

      # Azure login for prod using SP credentials
      - name: Login to Azure (SP for prod)
        if: github.ref_name == 'main'
        uses: azure/login@v1.6.1
        with:
          client-id: ${{ secrets.PROD_AZURE_CLIENT_ID }}
          tenant-id: ${{ secrets.PROD_AZURE_TENANT_ID }}
          subscription-id: ${{ secrets.PROD_AZURE_SUBSCRIPTION_ID }}

      - name: Export ARM_* env vars (prod)
        if: github.ref_name == 'main'
        run: |
          echo "ARM_CLIENT_ID=${{ secrets.PROD_AZURE_CLIENT_ID }}" >> $GITHUB_ENV
          echo "ARM_TENANT_ID=${{ secrets.PROD_AZURE_TENANT_ID }}" >> $GITHUB_ENV
          echo "ARM_SUBSCRIPTION_ID=${{ secrets.PROD_AZURE_SUBSCRIPTION_ID }}" >> $GITHUB_ENV

      # Terraform: create infra
      - name: Setup Terraform
        uses: hashicorp/setup-terraform@v2
        with:
          terraform_version: 1.6.0

      - name: Terraform Init & Apply
        run: |
          cd terraform
          terraform init
          terraform apply -auto-approve -var="environment=${{ github.ref_name }}"

      # Wait for resources
      - name: Wait for Azure resources
        run: sleep 20

      # Get AKS credentials
      - name: Get AKS credentials
        run: |
          az aks get-credentials \
            --resource-group gocloud-${{ github.ref_name }}-rg \
            --name gocloud-${{ github.ref_name }}-aks \
            --overwrite-existing

      # Install Argo CD via Helm
      - name: Install Argo CD
        run: |
          kubectl create namespace argocd || true
          helm repo add argo https://argoproj.github.io/argo-helm
          helm repo update
          helm upgrade --install argocd argo/argo-cd --namespace argocd --set server.service.type=LoadBalancer

      # Wait for Argo CD
      - name: Wait for Argo CD
        run: |
          kubectl rollout status deployment/argocd-server -n argocd --timeout=120s

      # Sync Argo CD app (Helm chart pulls Docker image)
      - name: Sync Argo CD Application
        run: |
          PASSWORD=$(kubectl -n argocd get secret argocd-initial-admin-secret -o jsonpath="{.data.password}" | base64 --decode)
          ARGOCD_SERVER=$(kubectl get svc argocd-server -n argocd -o jsonpath='{.status.loadBalancer.ingress[0].ip}')
          argocd login $ARGOCD_SERVER --username admin --password $PASSWORD --insecure
          argocd app sync globalsend-site